---
- name: Demo Playbook
  hosts: all

  vars_files:
    - config.yml

  roles:
    - geerlingguy.docker

  tasks:
    - name: Install the wezterm gpg key
      ansible.builtin.get_url:
        url: https://apt.fury.io/wez/gpg.key
        dest: /etc/apt/trusted.gpg.d/wezterm-fury.asc
        mode: "644"
        force: yes

    - name: Add wezterm apt repository
      ansible.builtin.apt_repository:
        repo: deb https://apt.fury.io/wez/ * *
        filename: wezterm
        state: present

    - name: Install apt packages
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present

    - name: Download mise binary for Linux amd64
      ansible.builtin.get_url:
        url: "https://github.com/jdx/mise/releases/download/{{ mise_version }}/mise-{{ mise_version }}-linux-x64"
        dest: /usr/local/bin/mise
        mode: "0755"
        force: yes

    - name: Add tools to global mise config
      benpops89.mise.mise_tool:
        tools:
          - "{{ item }}"
        global: true
      loop: "{{ mise_tools }}"
